[include moonraker_obico_macros.cfg]
[include fluidd.cfg]
[virtual_sdcard]
path: /home/jansobczak/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# This file contains pin mappings for the stock 2022 Creality Ender 3
# S1 Plus. To use this config check the STM32 Chip on the Mainboard,
# during "make menuconfig" select accordingly either the
# STM32F103 with "28KiB bootloader" or the STM32F401 with
# "64KiB bootloader" and serial (on USART1 PA10/PA9) for both.

# For a direct serial connection, in "make menuconfig" select
# "Enable extra low-level configuration options" and  Serial
# (on USART2 PA3/PA2), which is on the 10 pin IDC cable used
# for the LCD module as follows: 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The filename
# must be changed to "firmware.bin"

# With STM32F401, you might need to put "firmware.bin" in a
# folder on the SD card called "STM32F4_UPDATE" in order to flash.

# See docs/Config_Reference.md for a description of parameters.

[include timelapse.cfg]
#STC
[include STC_level_adjust.cfg]
#KAMP 
[include KAMP_Settings.cfg]
[exclude_object]
#CustomMacros
[include macros.cfg]
#Spoolman
[include spoolman.cfg]

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -10
position_max: 310
position_min: -15
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -10
position_max: 304
position_min: -15
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
# enable_pin: !PC3 # Now Eddy Probe
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -4

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
gear_ratio: 42:12
rotation_distance: 26.359
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
# CALIBRATED PID
#control: pid
#pid_Kp=19.477 
#pid_Ki=1.014 
#pid_Kd=93.491
min_temp: 0
max_temp: 290
# OrcaSlicer
# pressure_advance: 0.032250
# KAMP Required
max_extrude_cross_section: 5
# Unload Load
max_extrude_only_distance: 120
max_extrude_only_velocity: 12


[heater_bed]
heater_pin: PA7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
# CALIBRATED
control = pid
pid_kp = 73.996
pid_ki = 0.821
pid_kd = 1667.684
min_temp: 0
max_temp: 105

[heater_fan hotend_fan]
pin: PC0
fan_speed: 1

[fan]
pin: PA0

[mcu]
serial: /dev/ttyAMA2
restart_method: command

[bed_mesh]
speed: 150
mesh_min: 15, 25 #original: mesh_min: 20, 20
mesh_max: 270, 263 #original: mesh_max: 283, 263
probe_count: 25, 25
#mesh_pps: 3,3 # This is not important with Eddy since we have some many points
algorithm: bicubic
#fade_end: 10
#fade_start: 1
adaptive_margin: 10
horizontal_move_z: 2 # Eddy
scan_overshoot: 8 # Eddy
# Leave empty for automatic avg.
#fade_target:

[safe_z_home]
#home_xy_position: 187, 192
#noze_center: X145.50 Y150.50
#bltouch offset: 31.5 40.5
home_xy_position: 187, 192
#home_xy_position: 177.5, 187.5 #original 177, 191 moved due to bed dent
speed: 75
z_hop: 10
z_hop_speed: 5

[filament_switch_sensor e0_sensor]
switch_pin: !PC15
pause_on_runout: true
runout_gcode: PAUSE

[pause_resume]
recover_velocity: 25

[temperature_sensor RPi]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp

[temperature_sensor MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu

[display_status]

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345 extruder]
cs_pin: rpi:None
spi_bus: spidev5.0

[adxl345 bed]
cs_pin: rpi:None
spi_bus: spidev6.0

[resonance_tester]
accel_chip_x: adxl345 extruder
accel_chip_y: adxl345 bed
probe_points: 177.5, 187.5, 25

[input_shaper]
shaper_freq_x: 53.4
damping_ratio_x: 0.1
shaper_type_x: mzv
shaper_freq_y: 35.2
damping_ratio_y: 0.1
shaper_type_y: mzv

[printer]
kinematics: cartesian
max_velocity: 240
#max_accel: 2000
max_accel: 3500
#minimum_cruise_ratio: 0.5
max_z_velocity: 5
max_z_accel: 100

[mcu eddy]
# Run 'ls /dev/serial/by-id/*' on your Pi to find your ID and replace below
serial: /dev/serial/by-id/usb-Klipper_rp2040_504450611857DB1C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu # Sets the type of sensor for Klipper to read
sensor_mcu: eddy # Sets the MCU of the eddy probe tempereature sensor
min_temp: 10 # Sets the minimum tempereature for eddys tempereature sensor to operate
max_temp: 100 # Sets the maximum tempereature for eddys tempereature sensor to operat

[probe_eddy_current btt_eddy]
sensor_type: ldc1612
i2c_mcu: eddy
i2c_bus: i2c0f
# MEASURE THESE OFFSETS: Distance from Nozzle to Eddy Center
# Common S1 Plus mounts place the eddy to the left (negative X)
x_offset: -31.5 # This is the same as my model
y_offset: -40.5 # This is the same as my model
z_offset: 2.0 # This is for scanning only
#reg_drive_current = 15

[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
horizontal_move_z: 2

[force_move]
enable_force_move: True # Allows a user to move the z axis down if they have no other means of homing Z and need to calibrate the Eddy.

# Uncomment this if you are using Eddy as the probe AND the homing endstop AND would like to use the beta z-offset control
[save_variables]
filename: ~/printer_data/config/variables.cfg

